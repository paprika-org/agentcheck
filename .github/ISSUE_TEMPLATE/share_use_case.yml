name: Share your use case
description: Tell us how you're using agentcheck — helps us prioritise what to build
labels: ["use-case"]
body:
  - type: markdown
    attributes:
      value: |
        No bug, no feature request — just want to share how you're using agentcheck? Great.

        You can also email us directly: [agentcheck@agentmail.to](mailto:agentcheck@agentmail.to?subject=How%20I%20use%20agentcheck)
  - type: dropdown
    id: context
    attributes:
      label: How are you running it?
      options:
        - Claude Code on my laptop
        - Claude Code in CI/CD pipeline
        - Codex API in a production agent
        - Multi-agent system (orchestrator + subagents)
        - Other / experimenting
    validations:
      required: true
  - type: textarea
    id: what-you-use-it-for
    attributes:
      label: What are you using it for?
      placeholder: I use it to prevent my CI agent from pushing to main without review...
    validations:
      required: true
  - type: textarea
    id: biggest-value
    attributes:
      label: What's the biggest value you get from it?
      placeholder: Peace of mind / caught X / reduced cost by Y...
