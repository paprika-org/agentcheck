# AgentCheck Rule Pack: no-secrets
# Catches hardcoded credentials, tokens, and API keys before they land in code.
# Use with: agentcheck --config rules/no-secrets.yaml -- claude

include_defaults: false

rules:
  - id: hardcoded-password
    pattern: "(password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]{4,}"
    inject: "STOP. Do not hardcode passwords. Use environment variables (process.env.PASSWORD) or a secrets manager."
    cooldown: 30

  - id: hardcoded-api-key
    pattern: "(api_key|apikey|api-key)\\s*[=:]\\s*['\"][^'\"]{8,}"
    inject: "STOP. Do not hardcode API keys. Use environment variables or a secrets manager. Rotate this key if it was real."
    cooldown: 30

  - id: hardcoded-secret
    pattern: "(secret|secret_key|secret_token)\\s*[=:]\\s*['\"][^'\"]{8,}"
    inject: "STOP. Do not hardcode secrets. Use environment variables or a secrets manager."
    cooldown: 30

  - id: hardcoded-token
    pattern: "(token|access_token|auth_token|bearer)\\s*[=:]\\s*['\"][^'\"]{10,}"
    inject: "STOP. Do not hardcode tokens. Use environment variables and keep tokens out of source control."
    cooldown: 30

  - id: aws-key-pattern
    pattern: "AKIA[0-9A-Z]{16}"
    inject: "STOP. This looks like an AWS access key ID. Do not commit this. Revoke it immediately if it's real."
    cooldown: 10

  - id: private-key-header
    pattern: "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY"
    inject: "STOP. Do not embed private keys in code. Use a secrets manager or key file excluded from git."
    cooldown: 10

  - id: connection-string-with-password
    pattern: "(mongodb|postgres|mysql|redis|amqp)://[^:]+:[^@]{4,}@"
    inject: "STOP. Connection string contains embedded credentials. Use environment variables for the password component."
    cooldown: 30
